services:
  postgres:
    image: postgres:18
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER?}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?}
      - POSTGRES_DB=${POSTGRES_DB?}
    volumes:
      - storage:/var/lib/postgresql
    restart: always
volumes:
  storage:
